<!-- 共通ナビゲーション -->
<nav style="margin-bottom: 20px; padding: 10px; background-color: #f8f9fa; border-radius: 4px;">
    <a href="{{ url_for('results.results') }}" style="text-decoration: none; color: #007bff; margin-right: 15px;">📊 Results</a>
    <a href="{{ url_for('systemlist') }}" style="text-decoration: none; color: #007bff; margin-right: 15px;">🖥️ Systems</a>
    <a href="{{ url_for('results.results_confidential') }}" style="text-decoration: none; color: #007bff; margin-right: 15px;">🔒 Confidential Results</a>
    <a href="{{ url_for('estimated.estimated_results') }}" style="text-decoration: none; color: #007bff; margin-right: 15px;">🔐 Estimated Results</a>

    {% if session.get('authenticated') %}
        {% if 'admin' in session.get('user_affiliations', []) %}
            <a href="{{ url_for('admin.users') }}" style="text-decoration: none; color: #007bff; margin-right: 15px;">⚙️ Admin</a>
        {% endif %}
        <span style="color: #555; margin-right: 10px;">{{ session.get('user_email') }}</span>
        <a href="{{ url_for('auth.logout') }}" style="text-decoration: none; color: #007bff;">Logout</a>
    {% else %}
        <a href="{{ url_for('auth.login') }}" style="text-decoration: none; color: #007bff;">Login</a>
    {% endif %}
</nav>
