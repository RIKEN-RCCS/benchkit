<!-- templates/_filter_dropdowns.html -->
<div class="control-row">
    <span class="control-label control-label-strong">Filter:</span>
    <label>SYSTEM: <select id="filterSystem" class="compact-select" onchange="applyServerFilter()">
        <option value="">All</option>
        {% for val in filter_options.systems %}
            <option value="{{ val }}" {% if current_system == val %}selected{% endif %}>{{ val }}</option>
        {% endfor %}
    </select></label>
    <label>CODE: <select id="filterCode" class="compact-select" onchange="applyServerFilter()">
        <option value="">All</option>
        {% for val in filter_options.codes %}
            <option value="{{ val }}" {% if current_code == val %}selected{% endif %}>{{ val }}</option>
        {% endfor %}
    </select></label>
    <label class="control-divider">&#x2514; Exp: <select id="filterExp" class="compact-select" onchange="applyServerFilter()">
        <option value="">All</option>
        {% for val in filter_options.exps %}
            <option value="{{ val }}" {% if current_exp == val %}selected{% endif %}>{{ val }}</option>
        {% endfor %}
    </select></label>
