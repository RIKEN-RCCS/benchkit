<style>
    /* Base page styles */
    body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        overflow-x: hidden;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: #1f2933;
        background:
            radial-gradient(circle at top right, rgba(20, 184, 166, 0.12), transparent 28%),
            linear-gradient(180deg, #f6fbfc 0%, #ffffff 50%, #f7f9fb 100%);
    }
    *, *::before, *::after { box-sizing: inherit; }
    a { color: #0f766e; }
    a:hover { color: #0b5f59; }

    .portal-page {
        max-width: 1240px;
        margin: 0 auto;
        padding: 0 24px 32px;
    }
    .page-hero {
        margin: 12px 0 14px;
        padding: 14px 18px;
        border-radius: 16px;
        border: 1px solid #d8e3e8;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 10px 24px rgba(18, 52, 77, 0.06);
    }
    .page-eyebrow {
        display: inline-block;
        margin-bottom: 6px;
        padding: 4px 8px;
        border-radius: 999px;
        background: #dff7f2;
        color: #0f766e;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    .page-title {
        margin: 0 0 4px;
        font-size: clamp(22px, 3.1vw, 30px);
        line-height: 1.12;
        letter-spacing: -0.03em;
    }
    .page-subtitle {
        margin: 0;
        max-width: 72ch;
        color: #52606d;
        line-height: 1.5;
        font-size: 14px;
    }
    .page-card {
        margin: 0 0 18px;
        padding: 18px 20px;
        border-radius: 18px;
        border: 1px solid #d8e3e8;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 12px 30px rgba(18, 52, 77, 0.06);
    }
    .table-card {
        overflow: hidden;
    }
    .table-wrap {
        overflow-x: auto;
    }
    .inline-notice {
        margin: 0 0 16px;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid #f7d38b;
        background: #fff8e7;
        color: #8a5a00;
        line-height: 1.55;
    }
    .inline-notice a {
        font-weight: 600;
    }
    .section-title {
        margin: 0 0 12px;
        font-size: 24px;
        letter-spacing: -0.02em;
    }
    .section-intro {
        margin: 0 0 16px;
        color: #52606d;
        line-height: 1.6;
    }
    .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
    }
    .control-label {
        font-size: 13px;
        color: #555;
    }
    .control-label-strong {
        font-weight: 700;
        font-size: 0.95em;
    }
    .control-label-spaced {
        margin-left: 16px;
    }
    .control-divider {
        margin-left: 8px;
        padding-left: 8px;
        border-left: 2px solid #cbd5e1;
    }
    .soft-button,
    button,
    select,
    input[type="email"],
    input[type="text"] {
        font-family: inherit;
    }
    .soft-button,
    button {
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid #c7dce5;
        background: #ffffff;
        color: #0f766e;
        cursor: pointer;
        transition: background-color 120ms ease, transform 120ms ease, border-color 120ms ease;
    }
    .soft-button:hover,
    button:hover {
        background: #eef8f7;
        border-color: #9fc7c2;
        transform: translateY(-1px);
    }
    select,
    input[type="email"],
    input[type="text"] {
        padding: 7px 10px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #1f2933;
    }
    .compact-select {
        padding: 4px 8px;
        font-size: 13px;
        border-radius: 8px;
    }
    .muted-empty {
        color: #666;
        font-size: 14px;
    }
    .pagination-row {
        padding: 8px 0;
        font-size: 14px;
    }
    .pagination-summary {
        color: #555;
    }
    .pagination-links {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .pagination-link {
        padding: 4px 10px;
        text-decoration: none;
    }
    .pagination-status,
    .pagination-disabled {
        padding: 4px 8px;
    }
    .pagination-disabled {
        color: #aaa;
    }
    .pagination-per-page {
        padding: 4px;
        font-size: 14px;
    }

    /* Shared table styles */
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #d8e3e8; padding: 6px 8px; font-size: 12px; }
    th { background-color: #eef6f8; overflow: visible; position: relative; color: #243b53; }
    td { white-space: nowrap; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    tbody tr:nth-child(even) { background-color: #fbfdfe; }
    tr:hover { background-color: #f2f8fa; }
    .underline-link { text-decoration: underline; color: darkblue; cursor: pointer; }
    .ts-cell { white-space: nowrap; font-size: 11px; }

    /* Tooltip styles */
    .tooltip {
        position: relative;
        cursor: help;
        border-bottom: 1px dotted #999;
    }
    .tooltip .tooltiptext {
        visibility: hidden;
        width: 300px;
        background-color: #333;
        color: #fff;
        text-align: left;
        border-radius: 6px;
        padding: 10px;
        position: absolute;
        z-index: 1000;
        bottom: 125%;
        left: 50%;
        margin-left: -150px;
        opacity: 0;
        transition: opacity 0.3s;
        font-size: 12px;
        line-height: 1.4;
    }
    .tooltip .tooltiptext::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        margin-left: -5px;
        border-width: 5px;
        border-style: solid;
        border-color: #333 transparent transparent transparent;
    }
    .tooltip:hover .tooltiptext {
        visibility: visible;
        opacity: 1;
    }

    body.tooltip-floating-enabled .tooltip .tooltiptext {
        display: none !important;
    }

    .tooltip-floating-layer {
        position: fixed;
        z-index: 10000;
        max-width: min(320px, calc(100vw - 24px));
        padding: 10px;
        border-radius: 6px;
        background: #333;
        color: #fff;
        font-size: 12px;
        line-height: 1.4;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.22);
        pointer-events: none;
        opacity: 0;
        transition: opacity 120ms ease;
    }

    .tooltip-floating-layer.is-visible {
        opacity: 1;
    }

    /* Left-edge tooltip alignment */
    .tooltip-left .tooltiptext {
        left: 0;
        margin-left: 0;
    }
    .tooltip-left .tooltiptext::after {
        left: 20px;
        margin-left: -5px;
    }

    /* Right-edge tooltip alignment */
    .tooltip-right .tooltiptext {
        right: 0;
        left: auto;
        margin-left: 0;
    }
    .tooltip-right .tooltiptext::after {
        right: 20px;
        left: auto;
        margin-left: 0;
    }

    /* OTP modal */
    .overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        display: flex; justify-content: center; align-items: center;
        z-index: 9999;
    }
    .modal {
        background: white; padding: 20px; border-radius: 8px; text-align: center;
    }

    @media (max-width: 900px) {
        .portal-page {
            padding: 0 14px 28px;
        }
        .page-card {
            padding: 16px;
        }
        .page-hero {
            padding: 12px 14px;
        }
        .page-title {
            font-size: 22px;
        }
        .page-subtitle {
            font-size: 13px;
        }
    }
</style>

<script>
function filterTable() {
    const input = document.getElementById("filterInput").value.toLowerCase();
    const rows = document.querySelectorAll("#resultsTable tbody tr");

    rows.forEach(row => {
        const rowText = row.innerText.toLowerCase();
        const terms = input.split(/\s+/).filter(t => t.length > 0);
        const match = terms.every(term => rowText.includes(term));
        row.style.display = match ? "" : "none";
    });
}

(function() {
    var floatingTooltip = null;
    var activeTooltip = null;
    var margin = 12;

    function ensureFloatingTooltip() {
        if (floatingTooltip) return floatingTooltip;
        floatingTooltip = document.createElement('div');
        floatingTooltip.className = 'tooltip-floating-layer';
        document.body.appendChild(floatingTooltip);
        document.body.classList.add('tooltip-floating-enabled');
        return floatingTooltip;
    }

    function getTooltipTextElement(target) {
        return target ? target.querySelector('.tooltiptext') : null;
    }

    function positionFloatingTooltip(target, layer) {
        var rect = target.getBoundingClientRect();
        var layerRect = layer.getBoundingClientRect();
        var top = rect.top - layerRect.height - 10;
        var left;

        if (target.classList.contains('tooltip-left')) {
            left = rect.left;
        } else if (target.classList.contains('tooltip-right')) {
            left = rect.right - layerRect.width;
        } else {
            left = rect.left + (rect.width / 2) - (layerRect.width / 2);
        }

        left = Math.max(margin, Math.min(left, window.innerWidth - layerRect.width - margin));
        if (top < margin) {
            top = rect.bottom + 10;
        }
        top = Math.max(margin, Math.min(top, window.innerHeight - layerRect.height - margin));

        layer.style.left = left + 'px';
        layer.style.top = top + 'px';
    }

    function showFloatingTooltip(target) {
        var textEl = getTooltipTextElement(target);
        if (!textEl) return;

        var layer = ensureFloatingTooltip();
        activeTooltip = target;
        layer.innerHTML = textEl.innerHTML;
        layer.classList.add('is-visible');
        positionFloatingTooltip(target, layer);
    }

    function hideFloatingTooltip(target) {
        if (!floatingTooltip) return;
        if (target && activeTooltip !== target) return;
        activeTooltip = null;
        floatingTooltip.classList.remove('is-visible');
        floatingTooltip.innerHTML = '';
    }

    document.addEventListener('mouseover', function(event) {
        var target = event.target.closest('.tooltip');
        if (!target) return;
        showFloatingTooltip(target);
    });

    document.addEventListener('mouseout', function(event) {
        var target = event.target.closest('.tooltip');
        if (!target) return;
        var related = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest('.tooltip') : null;
        if (related === target) return;
        hideFloatingTooltip(target);
    });

    document.addEventListener('focusin', function(event) {
        var target = event.target.closest('.tooltip');
        if (!target) return;
        showFloatingTooltip(target);
    });

    document.addEventListener('focusout', function(event) {
        var target = event.target.closest('.tooltip');
        if (!target) return;
        hideFloatingTooltip(target);
    });

    window.addEventListener('scroll', function() {
        if (activeTooltip && floatingTooltip && floatingTooltip.classList.contains('is-visible')) {
            positionFloatingTooltip(activeTooltip, floatingTooltip);
        }
    }, true);

    window.addEventListener('resize', function() {
        if (activeTooltip && floatingTooltip && floatingTooltip.classList.contains('is-visible')) {
            positionFloatingTooltip(activeTooltip, floatingTooltip);
        }
    });
})();
</script>
