<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - BenchKit</title>
    <style>
        body { font-family: sans-serif; margin: 40px auto; max-width: 420px; padding: 0 20px; }
        h1 { color: #333; }
        form { margin-top: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; color: #555; }
        input[type="email"],
        input[type="text"] {
            width: 100%; padding: 10px; margin-bottom: 16px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
            font-size: 16px;
        }
        button {
            padding: 10px 24px; background-color: #007bff; color: #fff;
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px;
        }
        button:hover { background-color: #0056b3; }
        .flash { padding: 10px; margin-bottom: 16px; border-radius: 4px; background-color: #fff3cd; color: #856404; border: 1px solid #ffc107; }
        a { color: #007bff; }
    </style>
</head>
<body>

<h1>Login</h1>

{% with messages = get_flashed_messages() %}
{% if messages %}
    {% for msg in messages %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}
{% endif %}
{% endwith %}

{% if step == "email" %}
<form method="POST" action="{{ url_for('auth.login') }}">
    <label for="email">Email address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
    <button type="submit">Continue</button>
</form>
{% elif step == "totp" %}
<p>Enter the 6-digit code from your authenticator app.</p>
<form method="POST" action="{{ url_for('auth.login') }}">
    <input type="hidden" name="email" value="{{ email }}">
    <label for="totp_code">TOTP Code</label>
    <input type="text" id="totp_code" name="totp_code" maxlength="6" pattern="[0-9]{6}"
           placeholder="123456" required autofocus autocomplete="one-time-code" inputmode="numeric">
    <button type="submit">Log in</button>
</form>
{% endif %}

</body>
</html>
