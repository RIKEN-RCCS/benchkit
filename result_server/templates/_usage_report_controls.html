<div class="control-row">
  <span style="font-size: 13px; color: #555;">Period:</span>
  {% set buttons = [("monthly", "Monthly"), ("semi_annual", "Semi-Annual"), ("fiscal_year", "Fiscal Year")] %}
  {% for val, label in buttons %}
  <a href="?period_type={{ val }}&fiscal_year={{ fiscal_year }}"
     class="usage-btn {% if period_type == val %}active{% endif %}">
    {{ label }}
  </a>
  {% endfor %}

  <span style="font-size: 13px; color: #555; margin-left: 16px;">Fiscal Year:</span>
  <select id="fiscalYearSelect" onchange="window.location.href='?period_type={{ period_type }}&fiscal_year=' + this.value"
          style="padding: 4px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 3px;">
    {% for fy in result.available_fiscal_years %}
    <option value="{{ fy }}" {% if fy == fiscal_year %}selected{% endif %}>FY{{ fy }}</option>
    {% endfor %}
  </select>

  {% if period_type != 'fiscal_year' %}
  <span style="font-size: 13px; color: #555; margin-left: 16px;">Filter:</span>
  <select id="periodFilterSelect" onchange="window.location.href='?period_type={{ period_type }}&fiscal_year={{ fiscal_year }}&period_filter=' + encodeURIComponent(this.value)"
          style="padding: 4px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 3px;">
    <option value="" {% if not period_filter %}selected{% endif %}>All Periods</option>
    {% for p in result.periods %}
    <option value="{{ p }}" {% if period_filter == p %}selected{% endif %}>{{ p }}</option>
    {% endfor %}
  </select>
  {% endif %}

  <input
    id="usageSearchInput"
    class="usage-search-box"
    type="text"
    placeholder="Filter application/system coverage and current-state tables"
    oninput="applyUsageSearch()"
  >
</div>
